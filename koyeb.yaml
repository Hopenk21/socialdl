services:
  - name: socialdl-backend
    type: web
    git:
      branch: main
    docker:
      dockerfile: Dockerfile
    ports:
      - port: 8000
        protocol: http
    routes:
      - path: /
        port: 8000
    env:
      - key: PORT
        value: "8000"
      - key: ALLOWED_ORIGINS
        value: "https://yourdomain.com,https://www.yourdomain.com"
    health_checks:
      - path: /health
        port: 8000
        initial_delay_seconds: 10
        period_seconds: 30
    scaling:
      min: 1
      max: 1
    instance_type: free
